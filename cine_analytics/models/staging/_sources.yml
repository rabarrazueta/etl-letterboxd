version: 2

sources:
  - name: silver_staging
    description: "Tablas Silver exportadas desde Delta Lake (GCS) a BigQuery por el notebook 03_staging_to_bq.py"
    tables:
      - name: src_silver_movies
        description: "Catálogo de películas enriquecidas con TMDB API"
        columns:
          - name: letterboxd_uri
            tests: [not_null, unique]
          - name: enrichment_status
            tests:
              - not_null
              - accepted_values:
                  values: ['SUCCESS', 'FUZZY_MATCH', 'NOT_FOUND', 'ERROR']

      - name: src_silver_diary_entries
        description: "Una fila por cada visualización registrada en el diario Letterboxd"
        columns:
          - name: letterboxd_uri
            tests: [not_null]
          - name: watched_date
            tests: [not_null]

      - name: src_silver_ratings
        description: "Ratings históricos de Letterboxd"
        columns:
          - name: letterboxd_uri
            tests: [not_null]
          - name: my_rating
            tests: [not_null]
