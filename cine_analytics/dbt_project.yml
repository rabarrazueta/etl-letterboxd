name: cine_analytics
version: "1.0.0"
config-version: 2

profile: cine_analytics

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
seed-paths:     ["seeds"]
clean-targets:  ["target", "dbt_packages"]

models:
  cine_analytics:
    staging:
      +materialized: view
    dimensions:
      +materialized: table
    bridges:
      +materialized: table
    facts:
      +materialized: incremental
      +on_schema_change: sync_all_columns

snapshots:
  cine_analytics: {}

vars:
  date_spine_start: '2000-01-01'
  date_spine_end:   '2030-12-31'
