rules:
  - column: "letterboxd_uri"
    dimension: "COMPLETENESS"
    threshold: 1.0
    nonNullExpectation: {}

  - column: "watched_date"
    dimension: "VALIDITY"
    threshold: 1.0
    rowConditionExpectation:
      sqlExpression: "watched_date <= CURRENT_DATE()"

  - column: "letterboxd_uri"
    dimension: "CONFORMANCE"
    threshold: 1.0
    regexExpectation:
      regex: "^https://boxd\\.it/[a-zA-Z0-9]+$"