rules:
  - column: "movie_id"
    dimension: "UNIQUENESS"
    threshold: 1.0
    uniquenessExpectation: {}

  - column: "release_year"
    ignoreNull: true
    dimension: "VALIDITY"
    threshold: 1.0
    rangeExpectation:
      minValue: "1888"
      maxValue: "2030"

  - column: "runtime_minutes"
    dimension: "CONSISTENCY"
    threshold: 1.0
    rowConditionExpectation:
      sqlExpression: "runtime_minutes >= 0"